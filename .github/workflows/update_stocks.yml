name: Update Stock Data

on:
  schedule:
    # 5分おきに実行（UTC）※GitHub Actions cron は仕様上ベストエフォートで遅延あり
    - cron: '*/5 * * * *'
  workflow_dispatch:   # 手動実行も可能

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          # PATを使うことでこのワークフローからのpushがdeploy.ymlを起動できる
          token: ${{ secrets.CRON_TRIGGER_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Fetch Japan stocks (kabutan.jp ストップ高)
        run: |
          cd ${{ github.workspace }}
          python scripts/fetch_japan_stocks.py
        continue-on-error: true

      - name: Fetch futures and FX (先物・為替)
        run: |
          cd ${{ github.workspace }}
          python scripts/fetch_futures.py
        continue-on-error: true

      - name: Fetch Nikkei 225 heatmap data (日経225ヒートマップ)
        run: |
          cd ${{ github.workspace }}
          python scripts/fetch_nikkei225.py
        continue-on-error: true

      - name: Fetch S&P 500 heatmap data (S&P500ヒートマップ)
        run: |
          cd ${{ github.workspace }}
          python scripts/fetch_sp500.py
        continue-on-error: true

      - name: Fetch US stocks (Yahoo Finance top gainers)
        run: |
          cd ${{ github.workspace }}
          python scripts/fetch_us_stocks.py
        continue-on-error: true

      - name: Fetch volume surge stocks (出来高急増)
        run: |
          cd ${{ github.workspace }}
          python scripts/fetch_volume_stocks.py
        continue-on-error: true

      - name: Fetch market events calendar (決算・経済指標)
        run: |
          cd ${{ github.workspace }}
          python scripts/fetch_events.py
        continue-on-error: true

      - name: Fetch earnings flash (決算速報・サプライズ決算)
        run: |
          cd ${{ github.workspace }}
          python scripts/fetch_earnings_flash.py
        continue-on-error: true

      - name: Fetch market news (本日の市場ニュース)
        run: |
          cd ${{ github.workspace }}
          python scripts/fetch_market_news.py
        continue-on-error: true

      - name: Fetch JP stock news (急騰理由・ニュース)
        run: |
          cd ${{ github.workspace }}
          python scripts/fetch_news.py
        continue-on-error: true

      - name: Fetch US stock news (米国株ニュース)
        run: |
          cd ${{ github.workspace }}
          python scripts/fetch_us_news.py
        continue-on-error: true

      - name: Check if data changed
        id: check-changes
        run: |
          git diff --quiet data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/japan_stocks.json data/us_stocks.json data/volume_stocks.json data/translation_cache.json data/events.json data/earnings_flash.json data/news_cache.json data/us_news_cache.json data/market_news.json data/futures.json data/nikkei225.json data/sp500.json
          git commit -m "chore: update stock data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          # リモートの変更を取り込んでからプッシュ（競合時はリモートを優先）
          git fetch origin main
          git rebase origin/main || (git rebase --abort && echo "rebase skipped")
          git push origin main

      - name: No changes detected
        if: steps.check-changes.outputs.changed != 'true'
        run: echo "Data unchanged, skipping commit."

  # データ更新後のデプロイは deploy.yml (push トリガー) が担当
  # update-data が git push すると自動的に deploy.yml が起動する
