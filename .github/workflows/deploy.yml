name: Deploy on Push

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # GitHub Pages へのデプロイ
  deploy-pages:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ConoHa WING へのFTPデプロイ
  deploy-conoha:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Deploy to ConoHa WING via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: www292.conoha.ne.jp
          username: dashboard@stock-overflow24.com
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./
          server-dir: /public_html/dashboard.stock-overflow24.com/
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            .claude/**
            scripts/**
            requirements.txt
            *.md
